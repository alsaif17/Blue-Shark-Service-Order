name: Release foundation validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'app/lib/update-signature.js'
      - 'app/tests/update-signature.test.js'
      - 'tools/**'
      - 'scripts/verify-foundation.ps1'
      - 'version.json'

permissions:
  contents: read

jobs:
  validate-release-foundation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
          package-manager-cache: false
      - name: Install locked dependencies
        working-directory: app
        run: npm ci --ignore-scripts
      - name: Verify local foundation only
        shell: pwsh
        run: |
          .\scripts\verify-foundation.ps1 -GitExecutable (Get-Command git.exe).Source -NodeExecutable (Get-Command node.exe).Source
