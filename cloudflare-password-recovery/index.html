<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src https://grrlrzijcxxbqjsojnmm.supabase.co; form-action 'self'; base-uri 'none'">
  <title>استعادة كلمة المرور | Blue Shark</title>
  <style>
    :root{color-scheme:dark;--bg:#07141d;--card:#0d2230;--line:#1d4053;--text:#f4fbff;--muted:#a9c1cf;--blue:#21a9e8;--blue2:#087db7;--ok:#58d69a;--bad:#ff8090}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at top,#123447 0,var(--bg) 58%);font-family:Tahoma,Arial,sans-serif;color:var(--text)}
    main{width:min(100%,460px);background:linear-gradient(180deg,rgba(17,48,65,.98),rgba(9,29,41,.98));border:1px solid var(--line);border-radius:24px;padding:30px;box-shadow:0 24px 70px #0008}
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:24px}
    .mark{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(145deg,var(--blue),var(--blue2));font-size:30px;box-shadow:0 12px 28px #0099db44}
    h1{font-size:25px;margin:0 0 5px}.sub{margin:0;color:var(--muted);font-size:14px;line-height:1.7}
    label{display:block;margin:18px 0 8px;font-weight:700}
    input{width:100%;border:1px solid #285066;border-radius:13px;background:#071923;color:var(--text);padding:14px 15px;font:inherit;outline:none}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px #21a9e822}
    button{width:100%;margin-top:20px;border:0;border-radius:13px;padding:14px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;font:700 16px Tahoma,Arial,sans-serif;cursor:pointer}
    button:disabled{opacity:.55;cursor:wait}
    #message{min-height:24px;margin:16px 0 0;text-align:center;font-size:14px;line-height:1.7}
    .ok{color:var(--ok)}.bad{color:var(--bad)}
    .note{border-top:1px solid var(--line);margin-top:22px;padding-top:17px;color:var(--muted);font-size:12px;line-height:1.8}
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="mark" aria-hidden="true">🦈</div>
      <div>
        <h1>Blue Shark</h1>
        <p class="sub">تعيين كلمة مرور جديدة</p>
      </div>
    </div>

    <form id="form">
      <label for="password">كلمة المرور الجديدة</label>
      <input id="password" type="password" minlength="8" autocomplete="new-password" required>

      <label for="confirm">تأكيد كلمة المرور</label>
      <input id="confirm" type="password" minlength="8" autocomplete="new-password" required>

      <button id="submit" type="submit">حفظ كلمة المرور</button>
    </form>

    <p id="message" role="status" aria-live="polite"></p>
    <p class="note">هذه الصفحة تستخدم رمز الاستعادة المؤقت المرسل إلى بريدك فقط. لن تُحفظ كلمة المرور في الصفحة أو المتصفح.</p>
  </main>

  <script>
    const SUPABASE_URL = "https://grrlrzijcxxbqjsojnmm.supabase.co";
    const PUBLISHABLE_KEY = "sb_publishable_I10XsC-GCFGKxf8Xd0iLdQ_V1ij4mJO";
    const form = document.getElementById("form");
    const submit = document.getElementById("submit");
    const message = document.getElementById("message");
    let accessToken = "";

    function show(text, ok = false) {
      message.textContent = text;
      message.className = ok ? "ok" : "bad";
    }

    async function initialize() {
      const hash = new URLSearchParams(location.hash.slice(1));
      const query = new URLSearchParams(location.search);
      const error = hash.get("error_description") || query.get("error_description");
      if (error) throw new Error(decodeURIComponent(error.replace(/\+/g, " ")));

      accessToken = hash.get("access_token") || "";
      const tokenHash = query.get("token_hash");
      if (!accessToken && tokenHash) {
        const response = await fetch(SUPABASE_URL + "/auth/v1/verify", {
          method: "POST",
          headers: {"apikey": PUBLISHABLE_KEY, "content-type": "application/json"},
          body: JSON.stringify({token_hash: tokenHash, type: "recovery"})
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.access_token) throw new Error("تعذر التحقق من رابط الاستعادة. اطلب رابطًا جديدًا.");
        accessToken = data.access_token;
      }

      if (!accessToken) throw new Error("رابط الاستعادة غير صالح أو انتهت صلاحيته. اطلب رابطًا جديدًا.");
      history.replaceState(null, "", location.pathname);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      if (password.length < 8) return show("يجب ألا تقل كلمة المرور عن 8 أحرف.");
      if (password !== confirm) return show("كلمتا المرور غير متطابقتين.");

      submit.disabled = true;
      show("جارٍ حفظ كلمة المرور…", true);
      try {
        const response = await fetch(SUPABASE_URL + "/auth/v1/user", {
          method: "PUT",
          headers: {
            "apikey": PUBLISHABLE_KEY,
            "authorization": "Bearer " + accessToken,
            "content-type": "application/json"
          },
          body: JSON.stringify({password})
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.msg || data.message || "تعذر تحديث كلمة المرور.");
        form.reset();
        form.hidden = true;
        show("تم تحديث كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول إلى Blue Shark.", true);
      } catch (error) {
        show(error.message || "تعذر تحديث كلمة المرور.");
        submit.disabled = false;
      }
    });

    initialize().catch((error) => {
      form.hidden = true;
      show(error.message || "رابط الاستعادة غير صالح.");
    });
  </script>
</body>
</html>
